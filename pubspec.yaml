name: blinking
description: "A personal memory capture app for reflection and learning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  
  # Firebase (Optional - enable when ready)
  # firebase_core: ^3.13.0
  # firebase_auth: ^5.5.4
  # cloud_firestore: ^5.6.10
  # firebase_storage: ^12.4.4
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Media
  image_picker: ^1.1.2
  flutter_sound: ^9.16.3
  permission_handler: ^11.3.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  open_filex: ^4.5.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1
  
  # Export/Import
  archive: ^4.0.4
  share_plus: ^10.1.4
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true