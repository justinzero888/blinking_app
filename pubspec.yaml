name: blinking
description: "A personal memory capture app for reflection and learning."
publish_to: 'none'
version: 1.1.0-beta.8+27

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  
  # Firebase (Optional - enable when ready)
  # firebase_core: ^3.13.0
  # firebase_auth: ^5.5.4
  # cloud_firestore: ^5.6.10
  # firebase_storage: ^12.4.4
  
  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  permission_handler: ^11.3.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  open_filex: ^4.5.0
  # Export/Import
  archive: ^4.0.4
  share_plus: ^12.0.2
  url_launcher: ^6.3.1

  # HTTP (for future LLM API calls)
  http: ^1.2.0
  file_picker: ^8.1.7

  # Charts
  fl_chart: ^0.70.0

  # IAP
  purchases_flutter: ^9.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  sqflite_common_ffi: ^2.3.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0D3B34"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/