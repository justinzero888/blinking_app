# K10: All 3 keepsake entry points functional
# EntryDetail → Assistant → Reflection session
appId: com.blinking.blinking
---
- runFlow: ../../subflows/launch.yaml

# --- Entry Point 1: EntryDetail keepsake button ---
- tapOn:
    id: "nav_moments"
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible:
      id: "entry_item"
    timeout: 8000
- scroll
- extendedWaitUntil:
    visible:
      id: "entry_item"
    timeout: 5000
- tapOn:
    id: "entry_item"
    index: 0
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible:
      id: "btn_save_keepsake"
    timeout: 10000
- assertVisible:
    id: "btn_save_keepsake"

# --- Entry Points 2 & 3: AI robot button exists on main screen ---
# Go back from entry detail — swipe from left edge to trigger iOS interactive pop
- swipe:
    start: "2%, 50%"
    end: "60%, 50%"
    duration: 400
- extendedWaitUntil:
    visible:
      id: "btn_ai_robot"
    timeout: 8000
- assertVisible:
    id: "btn_ai_robot"
