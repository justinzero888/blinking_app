# K4: Content field is editable — type custom text, verify it appears
# (AI Rewrite was removed in v1.2.0+47)
appId: com.blinking.blinking
---
- runFlow: ../../subflows/launch.yaml

- tapOn:
    id: "nav_moments"
    waitToSettleTimeoutMs: 0
- extendedWaitUntil:
    visible:
      id: "entry_item"
    timeout: 8000
- scroll
- extendedWaitUntil:
    visible:
      id: "entry_item"
    timeout: 5000
- tapOn:
    id: "entry_item"
    index: 0
    waitToSettleTimeoutMs: 0
- tapOn:
    id: "btn_save_keepsake"
    waitToSettleTimeoutMs: 0

# Verify content field is present
- assertVisible:
    id: "card_builder_content"

# Clear existing content and type new text
- tapOn:
    id: "card_builder_content"
    waitToSettleTimeoutMs: 0
- eraseText: 1000
- inputText: "Edited by UAT"

# Verify typed text is visible in the field
- assertVisible: "Edited by UAT"

# Verify Save button is still present (field interaction didn't break layout)
- assertVisible:
    id: "btn_card_save"
