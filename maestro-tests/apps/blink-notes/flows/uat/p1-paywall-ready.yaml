# P1-PAYWALL-READY: RevenueCat store init + dynamic pricing
# 1. Enter restricted mode: Settings -> General -> About -> tap version row 5x
# 2. Tap floating robot -> PaywallScreen opens (dormant visual -> paywall when restricted)
# 3. Verify: paywall opened ("Blinking Pro" headline accessible), no "Store unavailable" warning
#
# Note: "Blinking Pro" is the only PaywallScreen text reliably accessible via XCTest/UIAutomator
# on this Flutter build. Other body Text widgets (subtitle, price) are visible in screenshots
# but not consistently exposed in the accessibility tree. Store readiness is confirmed by the
# absence of the "Store unavailable" warning, which only renders when isInitialized == false.
appId: com.blinking.blinking
---
- runFlow: ../../subflows/launch.yaml

- tapOn:
    id: "nav_settings"
- waitForAnimationToEnd

- tapOn:
    id: "settings_tab_general"
- waitForAnimationToEnd

# Scroll to About section where btn_debug_toggle (version row) lives
- scroll
- waitForAnimationToEnd
- scroll
- waitForAnimationToEnd

# Tap version row 5x within the 2-second debounce window to enter restricted mode
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
# resetIdentity() makes 3 RC network calls before writing restricted state — wait for
# the snackbar which fires only after the full async chain (logOut → configure → init) completes
- extendedWaitUntil:
    visible:
      text: "Switched to restricted mode"
    timeout: 40000
- takeScreenshot: p1-restricted-mode-active

# Navigate to My Day -- FloatingRobotWidget is visible on the home screen
- tapOn:
    id: "nav_my_day"
- waitForAnimationToEnd
- takeScreenshot: p1-home-with-robot

# Tap robot -> EntitlementState.restricted routes to PaywallScreen
- tapOn:
    id: "btn_ai_robot"
- extendedWaitUntil:
    visible:
      text: "Blinking Pro"
    timeout: 10000
- takeScreenshot: p1-paywall-opened

# "Blinking Pro" headline confirms PaywallScreen is open and rendered
- assertVisible:
    text: "Blinking Pro"
- takeScreenshot: p1-price-displayed

# "Store unavailable" renders only when PurchasesService.isInitialized == false
# Absence confirms RevenueCat initialized and the Get Pro button is enabled
- assertNotVisible:
    text: "Store unavailable"
- takeScreenshot: p1-store-ready
