# MK-1, MK-6, MK-7: Create keepsake from entry (iPhone)
# MK-1: Builder opens with pre-filled content, select Ink Rhythm template, save
# MK-6: Badge chip visible on EntryDetailScreen after save
# MK-7: Badge tap → CardPreviewScreen with Edit + Share icons visible
#
# btn_save_keepsake: Semantics on photo_library IconButton in entry_detail_screen.dart
# card_builder_content: PENDING DEF-K-001 — Semantics identifier not yet added to content TextField
# template_tpl_ink_rhythm: Semantics on GestureDetector in card_template_picker.dart
# btn_card_save: Semantics on Save Keepsake ElevatedButton
# badge_keepsake: Semantics on ActionChip badge in entry_detail_screen.dart
# btn_edit_card / btn_share_card: Semantics on AppBar icons in card_preview_screen.dart
appId: com.blinking.blinking
---
- runFlow: ../../subflows/launch.yaml

# Create an entry
- tapOn:
    id: "btn_fab_add_entry"
- waitForAnimationToEnd
- tapOn:
    id: "input_entry_body"
- inputText: "UAT keepsake test entry for MK-1"
- tapOn:
    id: "btn_entry_save"
- waitForAnimationToEnd
- takeScreenshot: k1-entry-created

# Navigate to Moments tab and open entry detail
- tapOn:
    id: "nav_moments"
- waitForAnimationToEnd
- tapOn:
    id: "entry_item"
- waitForAnimationToEnd
- takeScreenshot: k1-entry-detail

# MK-1: Tap "Save as Keepsake" → builder opens
- tapOn:
    id: "btn_save_keepsake"
- waitForAnimationToEnd
- assertVisible:
    text: "Save as Keepsake"
# card_builder_content identifier pending (DEF-K-001) — assert pre-filled text instead
- assertVisible:
    text: "UAT keepsake test entry for MK-1"
- takeScreenshot: k1-builder-opened

# Select Ink Rhythm template
- tapOn:
    id: "template_tpl_ink_rhythm"
- waitForAnimationToEnd
- takeScreenshot: k1-ink-rhythm-selected

# Verify overlay toggles visible
- assertVisible:
    id: "toggle_show_mood"

- tapOn:
    text: "Save Keepsake"
- extendedWaitUntil:
    visible:
      text: "Keepsake saved"
    timeout: 15000
- takeScreenshot: k1-keepsake-saved

# MK-6: Badge visible on entry detail
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "badge_keepsake"
    direction: DOWN
- assertVisible:
    id: "badge_keepsake"
- takeScreenshot: k1-badge-visible

# MK-7: Tap badge → CardPreviewScreen
- tapOn:
    id: "badge_keepsake"
- waitForAnimationToEnd
- assertVisible:
    text: "Keepsake Preview"
- assertVisible:
    id: "btn_edit_card"
- assertVisible:
    id: "btn_share_card"
- takeScreenshot: k1-preview-open
