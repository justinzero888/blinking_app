# P2-PAYWALL-CTA-SMOKE: Restore Purchases round-trip confirms SDK path and recovery
# Simulator only — uses local StoreKit / Play test environment.
# Validates: SDK async path completes, _isRestoring resets, paywall stays open cleanly.
# "Get Pro" tap is not automated here — native payment sheet requires real-device sandbox.
# See Layer 3 real-device checklist in RCA-purchase-flow-v1.2.0.md for full CTA coverage.
appId: com.blinking.blinking
---
- runFlow: ../../subflows/launch.yaml

# Enter restricted mode: Settings -> General -> About -> tap version 5x
- tapOn:
    id: "nav_settings"
- waitForAnimationToEnd
- tapOn:
    id: "settings_tab_general"
- waitForAnimationToEnd
- scroll
- waitForAnimationToEnd
- scroll
- waitForAnimationToEnd
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
- tapOn:
    id: "btn_debug_toggle"
# resetIdentity() makes 3 RC network calls before writing restricted state — wait for
# the snackbar which fires only after the full async chain (logOut → configure → init) completes
- extendedWaitUntil:
    visible:
      text: "Switched to restricted mode"
    timeout: 40000

- tapOn:
    id: "nav_my_day"
- waitForAnimationToEnd

# Open paywall via robot button
- tapOn:
    id: "btn_ai_robot"
- extendedWaitUntil:
    visible:
      text: "Blinking Pro"
    timeout: 10000
- takeScreenshot: p2-paywall-ready

# Tap Restore Purchases -- performs a full SDK round-trip (Purchases.restorePurchases)
# without triggering a native payment sheet. On a fresh install with no prior purchase,
# this returns cleanly and leaves the paywall open. Confirms the async SDK path and
# _isRestoring reset work correctly end-to-end.
- tapOn:
    text: "Restore Purchases"
- extendedWaitUntil:
    visible:
      text: "Blinking Pro"
    timeout: 40000
- takeScreenshot: p2-restore-returned

# Paywall must still be open (not dismissed), store still ready
- assertVisible:
    text: "Blinking Pro"
- assertNotVisible:
    text: "Store unavailable"
- takeScreenshot: p2-cta-smoke-passed
