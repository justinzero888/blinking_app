appId: com.blinking.blinking
---
- launchApp:
    clearState: true
- runFlow: ../../../shared/dismiss-system-dialogs.yaml
- waitForAnimationToEnd

# Handle first-launch onboarding (clearState always triggers it)
# Page 1: intro screen — wait for Continue to be interactive, then tap
- extendedWaitUntil:
    visible:
      text: "Continue"
    timeout: 20000
- tapOn:
    text: "Continue"
- waitForAnimationToEnd
# Page 2: features overview ("Everything in My Day") — wait for Skip then tap
- extendedWaitUntil:
    visible:
      text: "Skip"
    timeout: 8000
- tapOn:
    text: "Skip"
- waitForAnimationToEnd

# Verify home screen is loaded
- extendedWaitUntil:
    visible:
      text: "My Day"
    timeout: 15000
