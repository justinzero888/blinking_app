name: UAT Gate — Blinking Notes

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 4 * * *'   # nightly at 04:00 UTC
  workflow_dispatch:

jobs:
  # ── Static analysis + unit tests — every PR and push (fast, free, reliable) ──
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Unit tests
        run: flutter test

  # ── Android UAT — every PR and push ──
  android-uat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Build debug APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Verify APK exists
        run: test -f build/app/outputs/flutter-apk/app-debug.apk && echo "APK built successfully"

  # ── iPhone UAT — nightly + manual dispatch ──
  iphone-uat:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Build iOS simulator
        run: |
          flutter pub get
          cd ios && pod install && cd ..
          flutter build ios --simulator --debug

      - name: Verify app built
        run: test -d build/ios/iphonesimulator/Runner.app && echo "iOS sim app built"

  # ── iPad UAT — nightly + manual dispatch ──
  ipad-uat:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Build iOS simulator
        run: |
          flutter pub get
          cd ios && pod install && cd ..
          flutter build ios --simulator --debug

      - name: Verify app built
        run: test -d build/ios/iphonesimulator/Runner.app && echo "iOS sim app built"
